# Corrupted dragon spheres dropped by space dragons when butchered.
# These exist primarily as placeholders; their behavior will be defined later.

- type: entity
  parent: BaseItem
  id: CorruptedDragonSphere1
  name: "corrupted dragon sphere (1)"
  description: "One of the Dragon Spheres, corrupted by evil draconic energy."
  components:
  - type: Sprite
    sprite: DragonStation/Objects/corrupted_balls.rsi
    state: corruptedball1
    scale: 0.6, 0.6
  - type: Item
    size: Small
  - type: Tag
    tags:
    - CorruptedDragonSphere

