- type: entity
  name: Z-Sword
  description: A replica of the legendary Zeta sword from the Kais' world. Despite having a sharp edge, it has none of the power the original one possesses.
  parent: BaseItem
  id: ZSword
  components:
  - type: Sharp
  - type: Sprite
    sprite: DragonStation/Objects/z_sword.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.25  # Very slow swing speed
    damage:
      types:
        Slash: 50
    soundHit: # Goobstation
      path: /Audio/Weapons/bladeslice.ogg
