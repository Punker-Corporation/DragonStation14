- type: entity
  id: PillSenzuEssence
  name: senzu bean
  description: A legendary bean said to restore someone from the brink of death.
  parent: Pill
  suffix: senzu 10u
  components:
    - type: Pill
      pillType: 0

    - type: Sprite
      sprite: DragonStation/Objects/senzu.rsi
      state: icon

    - type: Label
      currentLabel: senzu 10u

    - type: Edible
      delay: 0.1
