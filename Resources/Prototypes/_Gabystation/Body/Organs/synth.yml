- type: entity
  id: BaseSynthOrgan
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
    netsync: false
    sprite: _EinsteinEngines/Mobs/Species/IPC/organs.rsi
  - type: Organ
  # - type: Food
  # - type: Extractable
  #   grindableSolutionName: organ
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Oil
          Quantity: 10

- type: entity
  id: OrganSynthEyes
  parent: BaseSynthOrgan
  name: robotic eyes
  description: "01001001 00100000 01110011 01100101 01100101 00100000 01111001 01101111 01110101 00100001"
  components:
  - type: Sprite
    layers:
      - state: eyeball-l
      - state: eyeball-r
  - type: Organ
    slotId: eyes
  - type: Eyes
  - type: Tag
    tags:
    - Organ
    - Eyes

- type: entity
  id: OrganSynthTongue
  parent: BaseSynthOrgan
  name: vocal modulator
  description: "A vocal modulator, used to produce speech."
  components:
  - type: Sprite
    state: tongue
  - type: Organ
  - type: Tag
    tags:
    - Organ
    - Tongue

- type: entity
  id: OrganSynthEars
  parent: BaseSynthOrgan
  name: "sonic receptors"
  components:
  - type: Sprite
    state: ears
  - type: Organ


- type: entity
  id: OrganSynthStomach
  parent: BaseSynthOrgan
  name: food processor
  description: "A food processor, used to break down organic matter."
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    state: stomach
  - type: Organ
    slotId: stomach # Shitmed
    intCap: 28
    integrity: 28
    integrityThresholds:
      Normal: 28
      Damaged: 16
      Destroyed: 0
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 40
  - type: Stomach
    updateInterval: 40
  - type: OrganFoodProcessor
  - type: Tag # goob edit
    tags:
    - Stomach
  - type: Item
    size: Small
    heldPrefix: stomach

- type: entity
  id: OrganSynthPump
  parent: BaseSynthOrgan
  name: micro pump
  description: "A micro pump, used to circulate coolant."
  components:
  - type: Sprite
    state: heart-on
  - type: Organ
    slotId: pump
  - type: Heart
  - type: Tag
    tags:
    - Organ
    - Heart
  # The heart 'metabolizes' medicines and poisons that aren't filtered out by other organs.
  # This is done because these chemicals need to have some effect even if they aren't being filtered out of your body.
  # You're technically 'immune to poison' without a heart, but.. uhh, you'll have bigger problems on your hands.

  # This is fine?
  # - type: Metabolizer
  #   maxPoisonsProcessable: 2
  #   metabolizerTypes: [Human]
  #   groups:
  #   - id: Medicine
  #   - id: Poison
  #   - id: Narcotic
