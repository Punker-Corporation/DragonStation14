- type: body
  name: "waddler"
  id: Waddler
  root: chest
  slots:
    head:
      part: HeadWaddler
      connections:
      - chest
      organs:
        brain: OrganHumanBrain
        eyes: OrganHumanEyes
    chest:
      part: ChestWaddler
      organs:
        heart: OrganAnimalHeart
        lungs: OrganHumanLungs
        stomach: OrganAnimalStomach
        liver: OrganAnimalLiver
        kidneys: OrganHumanKidneys
      connections:
      - right hand
      - left hand
      - head # Shitmed
      - right foot
      - left foot
    right hand:
      part: RightHandWaddler
    left hand:
      part: LeftHandWaddler
    right foot:
      part: RightFootWaddler
    left foot:
      part: LeftFootWaddler
