- type: species
  id: Waddler
  name: species-name-waddler
  roundStart: true
  prototype: MobWaddler
  sprites: MobWaddlerSprites
  defaultSkinTone: "#0c0b52"
  markingLimits: MobWaddlerMarkingLimits
  dollPrototype: MobWaddlerDummy
  skinColoration: Hues
  maleFirstNames: NamesWaddler
  femaleFirstNames: NamesWaddler
  naming: First
  minHeight: 0.70
  defaultHeight: 0.80
  maxHeight: 0.80
  minWidth:  0.70
  defaultWidth: 0.80
  maxWidth: 0.80

- type: speciesBaseSprites
  id: MobWaddlerSprites
  sprites:
    Chest: MobWaddlerChest
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Head: MobWaddlerHead
    Face: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Eyes: MobWaddlerEye
    LHand: MobWaddlerLHand
    RHand: MobWaddlerRHand
    LFoot: MobWaddlerLFoot
    RFoot: MobWaddlerRFoot

- type: markingPoints
  id: MobWaddlerMarkingLimits
  onlyWhitelisted: false
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Snout:
      points: 1
      required: true
    Chest:
      points: 0
      required: false
    Undershirt:
      points: 0
      required: false
    RightFoot:
      points: 1
      required: true
      defaultMarkings: [WaddlerFeetR]
    LeftFoot:
      points: 1
      required: true
      defaultMarkings: [WaddlerFeetL]
    RightHand:
      points: 0
      required: false
    LeftHand:
      points: 0
      required: false
    Overlay:
      points: 1
      required: true
      defaultMarkings: [ WaddlerOverlay ]

- type: humanoidBaseSprite
  id: MobWaddlerEye
  baseSprite:
    sprite: _Gabystation/Mobs/Species/Waddler/parts.rsi
    state: eye

