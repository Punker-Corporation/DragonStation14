- type: species
  id: Synth
  name: species-name-synth
  roundStart: true
  prototype: MobSynth
  sprites: MobSynthSprites
  markingLimits: MobSynthMarkingLimits
  dollPrototype: MobSynthDummy
  skinColoration: HumanToned
  minAge: 0
  maxAge: 440
  oldAge: 50
  youngAge: 50
  maleFirstNames: IpcFirst
  femaleFirstNames: IpcFirst
  lastNames: IpcLast
  naming: FirstDashLast
  sexes:
  - Unsexed

- type: speciesBaseSprites
  id: MobSynthSprites
  sprites:
    Special: MobHumanoidAnyMarking
    Head: MobSynthHead
    Hair: MobHumanoidAnyMarking
    Face: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    Snout: MobHumanoidAnyMarking
    Underwear: MobHumanoidAnyMarking
    Undershirt: MobHumanoidAnyMarking
    Chest: MobSynthChest
    Groin: MobSynthGroin
    Eyes: MobHumanoidEyes
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    LArm: MobSynthLArm
    RArm: MobSynthRArm
    LHand: MobSynthLHand
    RHand: MobSynthRHand
    LLeg: MobSynthLLeg
    RLeg: MobSynthRLeg
    LFoot: MobSynthLFoot
    RFoot: MobSynthRFoot
    Wings: MobHumanoidAnyMarking

- type: markingPoints
  id: MobSynthMarkingLimits
  points:
    Head:
      points: 4
      required: true
      defaultMarkings: [ MobSynthHeadDefault ]
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Face:
      points: 5
      required: false
    Chest:
      points: 4
      required: true
      defaultMarkings: [ MobSynthChestDefault ]
    HeadSide:
      points: 5
      required: false
    Groin:
      points: 4
      required: true
      defaultMarkings: [ MobSynthGroinDefault ]
    RightLeg:
      points: 4
      required: false
      defaultMarkings: [ MobSynthRLegDefault ]
    RightFoot:
      points: 4
      required: false
      defaultMarkings: [ MobSynthRFootDefault ]
    LeftLeg:
      points: 4
      required: false
      defaultMarkings: [ MobSynthLLegDefault ]
    LeftFoot:
      points: 4
      required: false
      defaultMarkings: [ MobSynthLFootDefault ]
    RightArm:
      points: 4
      required: false
      defaultMarkings: [ MobSynthRArmDefault ]
    RightHand:
      points: 4
      required: false
      defaultMarkings: [ MobSynthRHandDefault ]
    LeftArm:
      points: 4
      required: false
      defaultMarkings: [ MobSynthLArmDefault ]
    LeftHand:
      points: 4
      required: false
      defaultMarkings: [ MobSynthLHandDefault ]


