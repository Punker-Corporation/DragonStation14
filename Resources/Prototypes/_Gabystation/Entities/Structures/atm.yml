- type: entity
  id: ComputerBankATMBase
  parent: BaseComputerAiAccess
  name: ATM
  desc: The devil in your wallet.
  abstract: true
  components:
  - type: ActivatableUIRequiresPower
  - type: Computer
    board: BankATMCircuitboard
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      board: !type:Container
      bankATM-cashSlot: !type:ContainerSlot
      bankATM-cardSlot: !type:ContainerSlot
  - type: BankATM
    cashSlot:
      name: bankATM-cashSlot
      insertSound: /Audio/Machines/scanning.ogg
      ejectSound: /Audio/Machines/tray_eject.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
          - Cash
    cardSlot:
      name: bankATM-cardSlot
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectSound: /Audio/Machines/id_swipe.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
          - NanoBankCard
  - type: ActivatableUI
    key: enum.BankATMUIKey.Key
  - type: UserInterface
    interfaces:
     enum.BankATMUIKey.Key:
        type: BankATMBui

- type: entity
  parent: [ComputerBankATMBase]
  id: ComputerBankATM
  components:
  - type: Sprite
    netsync: false
    sprite: _Gabystation/Structures/Machines/atm.rsi
    layers:
      - map: ["computerLayerBody"]
        state: icon
      - map: ["computerLayerScreen"]
        state: unshaded
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
  - type: PointLight
    enabled: true
    radius: 1.5
    energy: 1.6
    color: "#57A3F7"

- type: entity
  suffix: Wallmount
  parent: [ComputerBankATMBase]
  id: ComputerWallmountBankATM
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: Sprite
    netsync: false
    sprite: _Gabystation/Structures/Machines/wall_atm.rsi
    layers:
      - map: ["computerLayerBody"]
        state: icon
      - map: ["computerLayerScreen"]
        state: unshaded
  - type: GenericVisualizer
    visuals:
      enum.ComputerVisuals.Powered:
        computerLayerScreen:
          True: { visible: true, shader: unshaded }
          False: { visible: false }
  #- type: PointLight # light does not work well with wall mount entities
  #  enabled: true
  #  radius: 1.5
  #  energy: 1.6
  #  color: "#57A3F7"
  - type: Rotatable
    rotateWhileAnchored: false
  - type: WallMount
    arc: 360
