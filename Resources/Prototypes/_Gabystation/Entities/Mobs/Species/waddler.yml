- type: entity
  save: false
  name: Urist' McFlippers
  parent: BaseMobSpeciesOrganic
  id: BaseMobWaddler
  abstract: true
  components:
  - type: Clumsy
    clumsyHypo: false
    clumsyDefib: false
  - type: LightweightDrunk
  - type: WaddleAnimation
    hopIntensity: 0, 0.1
    runAnimationLengthMultiplier: 0.3
  - type: HumanoidAppearance
    species: Waddler
    markingsDisplacement:
      Hair:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi
            state: hair
      FacialHair:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: facialhair
    hideLayersOnEquip:
    - Snout
    - HeadSide
  - type: Hunger
  - type: Carriable
  - type: Puller
    needsHands: true
  - type: Thirst
  - type: Icon
    sprite: _Gabystation/Mobs/Species/Waddler/parts.rsi
    state: full
  - type: Body
    prototype: Waddler
    requiredLegs: 0
  - type: Sericulture
    productionLength: 2
    entityProduced: SnowBall
    popupText: snowball-failure-hunger
    hungerCost: 4
    action: ActionSericultureSnowball
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: FoodMeatPenguin
      amount: 5
  - type: Speech
    speechSounds: Harpy # Needs a better sound, but it is pretty hard to find actual penguin sounds
    speechVerb: Waddler
  - type: TypingIndicator
  - type: Vocal
    sounds:
      Male: MaleWaddler
      Female: FemaleWaddler
      Unsexed: MaleWaddler
  - type: ProfanityFilterAccent
    words: badwordfilter
    wordReplacement: "..."
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - TicTacToe
    - Penguin
    understands:
    - TauCetiBasic
    - TicTacToe # In fact, no one understands it!
    - Penguin
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Scale
  - type: Absorbable
  - type: MeleeWeapon
    attackRate: 4
    soundHit:
      collection: ToySqueak
    angle: 30
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 0
  - type: StaminaDamageOnHit
    damage: 5
  - type: TemperatureSpeed
    thresholds:
      272: 1
      242: 1
      196: 1
  - type: Temperature
    heatDamageThreshold: 308
    coldDamageThreshold: 253.15
    currentTemperature: 293.15
    specificHeat: 42
    coldDamage:
      types:
        Heat : 1.5
    heatDamage:
      types:
        Cold : 0.1
  - type: Inventory
    speciesId: waddler
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: gloves
      shoes:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: shoes
      back:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: back
      mask:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: mask
      outerClothing:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: outerClothing
      head:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: head
      belt:
        sizeMaps:
          32:
            sprite: _Gabystation/Mobs/Species/Waddler/displacement.rsi/
            state: belt
  - type: Consciousness
    threshold: 100
    cap: 210
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - WaddlerEmotes
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    layers:
      - map: [ "enum.HumanoidVisualLayers.Chest" ]
      - map: [ "enum.HumanoidVisualLayers.Head" ]
      - map: [ "enum.HumanoidVisualLayers.Snout" ]
      - map: [ "enum.HumanoidVisualLayers.Eyes" ]
      - map: [ "enum.HumanoidVisualLayers.LHand" ]
      - map: [ "enum.HumanoidVisualLayers.RHand" ]
      - map: [ "enum.HumanoidVisualLayers.LFoot" ]
      - map: [ "enum.HumanoidVisualLayers.RFoot" ]
      - map: [ "enum.HumanoidVisualLayers.Underwear" ]
      - map: [ "enum.HumanoidVisualLayers.Undershirt" ]
      - map: [ "jumpsuit" ]
      - map: [ "enum.HumanoidVisualLayers.Handcuffs" ]
        color: "#ffffff"
        sprite: Objects/Misc/handcuffs.rsi
        state: body-overlay-2
        visible: false
      - map: [ "shoes" ]
      - map: [ "ears" ]
      - map: [ "culteyes" ] # funky cult
        sprite: "_Funkystation/BloodCult/Effects/culteyes.rsi"
        state: "moth"
        shader: unshaded
        visible: false
      - map: [ "gloves" ]
      - map: [ "eyes" ]
      - map: [ "id" ]
      - map: [ "outerClothing" ]
      - map: [ "belt" ]
      - map: [ "enum.HumanoidVisualLayers.Tail" ]
      - map: [ "back" ]
      - map: [ "neck" ]
      - map: [ "enum.HumanoidVisualLayers.Face" ]
      - map: [ "enum.HumanoidVisualLayers.FacialHair" ]
      - map: [ "enum.HumanoidVisualLayers.HeadSide" ]
      - map: [ "maskalt" ]
      - map: [ "enum.HumanoidVisualLayers.Hair" ]
      - map: [ "mask" ]
      - map: [ "enum.HumanoidVisualLayers.HeadTop" ]
      - map: [ "head" ]
      - map: [ "pocket1" ]
      - map: [ "pocket2" ]
      - map: [ "clownedon" ] # Dynamically generated
        sprite: "Effects/creampie.rsi"
        state: "creampie_moth"
        visible: false
      - map: [ "culthalo" ] # funky cult
        sprite: "_Funkystation/BloodCult/Effects/halo.rsi"
        state: "halo"
        shader: unshaded
        visible: false
  # Corvax-Wega-Genetics-start
  - type: DnaModifier
    upper: MobWaddler
    lowest: MobPenguin
  # Corvax-Wega-Genetics-end

