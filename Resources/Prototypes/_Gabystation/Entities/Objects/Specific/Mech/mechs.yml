- type: entity
  id: BaseCompactPod
  save: false
  abstract: true
  components:
  - type: MobMover
  - type: Mech
    pilotBlacklist: # Goobstation Change
      components:
      - Zombie
      - ZombieBlob
      - CompactPodPassenger # Just no
    pilotWhitelist:
      tags:
      - StationAi # Funkystation - MalfAi
  - type: MechAir
  - type: AirFilter
    # everything except oxygen and nitrogen
    gases:
    - CarbonDioxide
    - Plasma
    - Tritium
    - WaterVapor
    - Ammonia
    - NitrousOxide
    - Frezon
    #- Helium3 TODO: fusion
    # <Goobstation> - healium not included for ADVANCED mech trolling
    - BZ
    - Nitrium
    - Hydrogen
    - HyperNoblium
    - ProtoNitrate
    - Zauker
    - Halon
    - Helium
    - AntiNoblium
    #- Helium3 TODO: fusion
    # </Goobstation>
    # remove everything except oxygen to maintain oxygen ratio
    overflowGases:
    - Nitrogen
    - CarbonDioxide
    - Plasma
    - Tritium
    - WaterVapor
    - Ammonia
    - NitrousOxide
    - Frezon
    #- Helium3 TODO: fusion
    # <Goobstation>
    - BZ
    - Healium
    - Nitrium
    - Pluoxium
    - Hydrogen
    - HyperNoblium
    - ProtoNitrate
    - Zauker
    - Halon
    - Helium
    - AntiNoblium
    # </Goobstation>
  - type: AirIntake
  # for intake and filter to work
  - type: AtmosDevice
    requireAnchored: false
    joinSystem: true
  - type: DoAfter
  - type: Repairable
    fuelCost: 25
    doAfterDelay: 10
  - type: UserInterface
    interfaces:
      enum.MechUiKey.Key:
        type: MechBoundUserInterface
  - type: Puller
    needsHands: false
  - type: InputMover
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 1
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: Pullable
  - type: Physics
    bodyType: Dynamic
  - type: Clickable
  - type: WiresPanel
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: Damageable
    damageContainer: Silicon # Goobstation
    damageModifierSet: LightArmor # Goobstation
  - type: GuideHelp
    guides:
    - Robotics
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    softness: 5
    autoRot: true
    mask: /Textures/Effects/LightMasks/cone.png
    radius: 7
    energy: 3
    netsync: false
  - type: RadarBlip
    radarColor: Green
    requireNoGrid: true
  - type: StaticPrice
    price: 3000
  - type: DragDropTargetable

- type: entity
  parent: BaseCompactPod
  id: SpaceBuoy
  name: Space Buoy
  description: Compact two-person emergency craft designed for rapid zero-gravity transport. Fully sealed with internal O2 supply and thermal protection, it excels in space but performs poorly under gravity.
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    sprite: _Gabystation/Objects/Specific/Mech/SpaceBuoy.rsi
    layers:
    - map: [ "enum.MechVisualLayers.Base" ]
      state: icon
    - state: thruster
      shader: unshaded
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 1
  - type: Jetpack
    moleUsage: 0.0
    acceleration: 10
    weightlessModifier: 4
    friction: 0.9
  - type: CompactPod
  - type: Mech
    maxEquipmentAmount: 1
    baseState: icon
    openState: icon
    brokenState: broken
    mechToPilotDamageMultiplier: 0.1
    airtight: true
    pilotWhitelist:
      components:
      - HumanoidAppearance

- type: entity
  parent: SpaceBuoy
  id: SpaceBuoyBattery
  suffix: Battery
  components:
  - type: ContainerFill
    containers:
      mech-battery-slot:
      - PowerCellHigh
