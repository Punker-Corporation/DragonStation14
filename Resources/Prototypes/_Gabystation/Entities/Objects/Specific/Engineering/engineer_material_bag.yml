- type: entity
  parent: BaseStorageItem
  id: EngineerMaterialBag
  name: material bag
  description: A bag used by engineers to carry large amounts of materials.
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Specific/materialbag.rsi
    state: icon
  - type: Item
    size: Large
    storedRotation: -90
  - type: Clothing
    quickEquip: false
    slots:
    - belt
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,7,3
    quickInsert: true
    areaInsert: true
    whitelist:
      tags:
      - Sheet
      - Ingot
  - type: Dumpable