- type: entity
  id: ImpactPlasmaCut
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.25
  - type: Sprite
    drawdepth: Effects
    layers:
    - shader: unshaded
      map: ["enum.EffectLayers.Unshaded"]
      sprite: _Gabystation/Objects/Weapons/Guns/Impacts/PlasmaCutter.rsi
      state: impact_eletric
  - type: EffectVisuals
  - type: Tag
    tags:
      - HideContextMenu

