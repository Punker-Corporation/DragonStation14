- type: entity
  id: CartridgeSWS
  name: SWS Cartridge
  parent: BaseCartridgeLightRifle
  description: Ultra-low caliber cartridges to be used in SWS Rifles.
  components:
  - type: Tag
    tags:
      - CartridgeSWS
  - type: CartridgeAmmo
    proto: SWSShot
  - type: Sprite
    sprite: _Gabystation/Objects/Weapons/Guns/Ammunition/Cartridges/SWSPulseCartridge.rsi
    layers:
      - state: base
        map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: "base"
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Weapons/Guns/Casings/casing_fall_2.ogg
      params:
        volume: -10
