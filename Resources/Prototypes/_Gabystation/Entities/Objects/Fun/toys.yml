- type: entity
  parent: PlushieDurk
  id: PlushieBruceGringo
  name: Gringo plushie
  description: A cute stuffed toy made in space gringo china, you fell that came from brazil
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Fun/toys.rsi
    state: plushie_bruce

- type: entity
  parent: BasePlushie
  id: PlushieNikuHatsume
  name: Niku Hatsume plushie
  description: Pelúcia da Niku Hatsume super kawaii, com cabelinhos macios e um charme irresistível!
  components:
    - type: Sprite
      sprite: _Gabystation/Objects/Fun/toys.rsi
      state: plushie_miku
    - type: EmitSoundOnUse
      sound:
        path: /Audio/_Gabystation/Misc/Okarimono.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_Gabystation/Misc/Okarimono.ogg
    - type: EmitSoundOnActivate
      sound:
        path: /Audio/_Gabystation/Misc/Okarimono.ogg
    - type: EmitSoundOnTrigger
      sound:
        path: /Audio/_Gabystation/Misc/Okarimono.ogg
    - type: EmitSoundOnCollide
      sound:
        path: /Audio/_Gabystation/Misc/Okarimono.ogg

