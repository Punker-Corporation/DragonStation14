- type: entity
  parent: BasePlushie
  id: PlushieTajaran
  name: Pelúcias dos Tajarans
  description: Pelúcia dos homi gatos que saem por ai fazendo miau miau, obtenha o seu ainda hoje!
  components:
    - type: Sprite
      sprite: _Gabystation/Objects/Fun/Plushies/tajaran.rsi
      state: tajaran
    - type: Item
      size: Small
      sprite: _Gabystation/Objects/Fun/Plushies/tajaran.rsi
    - type: Clothing
      quickEquip: false
      sprite: _Gabystation/Objects/Fun/Plushies/tajaran.rsi
      slots:
      - HEAD
    - type: EmitSoundOnUse
      sound:
        path: /Audio/Animals/cat_meow.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Animals/cat_meow2.ogg
    - type: EmitSoundOnActivate
      sound:
        path: /Audio/Animals/cat_meow.ogg
    - type: EmitSoundOnTrigger
      sound:
        path: /Audio/Animals/cat_meow2.ogg
    - type: EmitSoundOnCollide
      sound:
        path: /Audio/Animals/cat_meow2.ogg

