# region Base replacements
- type: entity
  parent: CardHandBase
  id: CardHandNunoBase
  categories: [ HideSpawnMenu ]
  name: hand of cards
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Fun/cards-totallynotuno.rsi
    state: singlecard_down

- type: entity
  parent: CardDeckBase
  id: CardDeckNunoBase
  categories: [ HideSpawnMenu ]
  name: (Nuno™) deck of cards
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Fun/cards-totallynotuno.rsi
    state: singlecard_down

- type: entity
  parent: CardBase
  id: CardNunoBase
  name: card
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Gabystation/Objects/Fun/cards-totallynotuno.rsi
    state: singlecard_down
  - type: Card
    backSpriteLayers:
    - sprite: _Gabystation/Objects/Fun/cards-totallynotuno.rsi
      state: singlecard_down
    flipped: true
    cardHandBaseName: CardHandNunoBase
    cardDeckBaseName: CardDeckNunoBase
# endregion Base replacements


- type: entity
  parent: CardBoxBase
  id: CardBoxNuno
  name: Nuno™
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Gabystation/Objects/Fun/cards-totallynotuno.rsi
    layers:
    - state: box
    - state: box_open
      map: [ "openLayer" ]
      visible: false
  - type: OpenTriggeredStorageFill
    contents:
    - id: CardDeckNuno
      amount: 1
  - type: StaticPrice
    price: 25

