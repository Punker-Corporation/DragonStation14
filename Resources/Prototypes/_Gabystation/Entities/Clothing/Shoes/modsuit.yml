- type: entity
  parent: ClothingShoesBase
  id: ClothingModsuitBootsMining
  name: pioneer modsuit boots
  description: Go forth, pioneer, for there are still mountains to be mined.
  categories: [ HideSpawnMenu ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Gabystation/Clothing/Shoes/Modsuits/mining.rsi
    layers:
    - state: boots
    - state: boots-sealed
      map: [ "sealed" ]
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    slots: [ feet ]
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: SealableClothing
    sealUpPopup: sealable-clothing-seal-up-boots
    sealDownPopup: sealable-clothing-seal-down-boots
  - type: SealableClothingVisuals
    spriteLayer: sealed
    clothingVisuals:
      shoes:
      - state: equipped-FEET-sealed
      shoes-vox:
      - state: equipped-FEET-sealed-vox
      shoes-reptilian:
      - state: equipped-FEET-sealed-reptilian
      shoes-resomi:
      - state: equipped-FEET-sealed-resomi
  - type: Armor
    traumaDeductions:
      Dismemberment: 0.1
      OrganDamage: 0.1
      BoneDamage: 0.1
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
