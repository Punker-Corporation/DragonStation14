- type: entity
  parent: Vampire
  id: VampireMidround
  components:
  - type: StationEvent
    earliestStart: 30
    weight: 3
    minimumPlayers: 30
    startAnnouncement: station-event-communication-interception
    startAudio:
      path: /Audio/Announcements/intercept.ogg
    duration: null
    occursDuringRoundEnd: false
    chaos:
      Hostile: 200
      Medical: 150
      Death: 200
    eventType: HostilesSpawn
  - type: GameRule
    chaosScore: 300
  - type: AlertLevelInterceptionRule
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: vampire-roundend-name
    definitions:
    - prefRoles: [ Vampire ]
      max: 1
      playerRatio: 15
      blacklist:
        components:
        - AntagImmune
        - BibleUser
      lateJoinAdditional: true
      jobBlacklist: [ Chaplain ] # GOOBSTATION
      mindRoles:
      - MindRoleVampire
  - type: Tag
    tags:
      - MidroundAntag

# Midround Heretics
- type: entity
  parent: Heretic
  id: HereticMidround
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 3
    minimumPlayers: 30
    maxOccurrences: 1
    startAnnouncement: station-event-communication-interception
    startAudio:
      path: /Audio/Announcements/intercept.ogg
    duration: null
    occursDuringRoundEnd: false
    chaos:
      Hostile: 200
      Medical: 150
      Death: 200
    eventType: HostilesSpawn
  - type: GameRule
    chaosScore: 500
  - type: AlertLevelInterceptionRule
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 2
      min: 1
      playerRatio: 15
      blacklist:
        components:
        - CommandStaff
        - AntagImmune
        - BibleUser
      startingGear: Heretictmidround
      lateJoinAdditional: true
      jobBlacklist: [ Chaplain ] # GOOBSTATION
      mindRoles:
      - MindRoleHeretic
  - type: Tag
    tags:
      - MidroundAntag

# Midround Cosmic Cultist
- type: entity
  parent: CosmicCult
  id: CosmicCultMidround
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 3
    minimumPlayers: 30
    maxOccurrences: 1
    startAnnouncement: station-event-communication-interception
    startAudio:
      path: /Audio/Announcements/intercept.ogg
    duration: null
    occursDuringRoundEnd: false
    chaos:
      Hostile: 400
      Medical: 400
      Death: 400
    eventType: HostilesSpawn
  - type: GameRule
    chaosScore: 1200
  - type: AlertLevelInterceptionRule
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: cosmic-cult-roundend-name 
    definitions:
    - prefRoles: [ CosmicAntagCultist ]
      max: 4
      min: 2
      playerRatio: 15
      blacklist:
        components:
        - CommandStaff
        - AntagImmune
        - BibleUser
      lateJoinAdditional: true
      jobBlacklist: [ Chaplain ]
      mindRoles:
      - MindRoleCosmicCult
  - type: Tag
    tags:
      - MidroundAntag

