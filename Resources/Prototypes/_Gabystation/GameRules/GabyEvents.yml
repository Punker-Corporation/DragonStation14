- type: entity
  id: NecromorphSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/_Gabystation/Animals/necro1.ogg
      params:
        volume: -4
    earliestStart: 20
    minimumPlayers: 15
    weight: 5
    duration: 60
    maxOccurrences: 1 # necromorph nerf (são mto forte pra ter toda hora)
    chaos:
      Hostile: 20
      Medical: 50
    eventType: HostilesSpawn
  - type: GameRule
    chaosScore: 40
  - type: VentCrittersRule
    table: !type:GroupSelector
      children:
      - id: NecromorphSlasher
        weight: 0.04
      - id: NecromorphSlasherCorpo
        weight: 0.1
