- type: gameMap
  id: Gax
  mapName: 'NCS Gax'
  mapPath: /Maps/_Gabystation/gaxstation.yml
  minPlayers: 10
  maxPlayers: 45
  stations:
    Gax:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_omega.yml
        - type: StationNameSetup
          mapNameTemplate: '{0} NCS Gax {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'YG'
        - type: StationJobs
          availableJobs:
            #service
            Captain: [ 1, 1 ]
            NanotrasenRepresentative: [ 1, 1 ]
            BlueshieldOfficer: [ 1, 1 ]
            HeadOfPersonnel: [ 1, 1 ]
            AdministrativeAssistant: [ 1, 1 ]
            Bartender: [ 1, 1 ]
            Botanist: [3 , 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 2 ]
            ServiceWorker: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            #Engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 4, 4 ]
            StationEngineer: [ 4, 4 ]
            TechnicalAssistant: [ 2, 2 ]
            #Medical
            ChiefMedicalOfficer: [ 1, 1 ]
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 3, 3 ]
            MedicalIntern: [ 3, 3 ]
            Paramedic: [ 2, 2 ]
            #Science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 4, 4 ]
            ResearchAssistant: [ 2, 2 ]
            #Security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 4, 4 ]
            SecurityCadet: [ 4, 4 ]
            Detective: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
            PermaPrisoner: [ 2, 2 ] # Gaby
            Brigmedic: [ 1, 1 ]
            #Supply
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 1, 3 ]
            CargoTechnician: [ 2, 2 ]
            #Civillian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #Silicon
            StationAi: [ 1, 1 ]
            Borg: [ 2, 3 ]
        # Goobstation blob-config-start SMALL+
        - type: StationBlobConfig
          stageBegin: 25
          stageCritical: 350
          stageTheEnd: 700
        # Goobstation blob-config-end
