- type: loadout
  id: GoldenShaker
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobBartender
      time: 360000 # 100hr
  storage:
    back:
    - GoldenDrinkShaker

- type: loadout
  id: DrinkShaker
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobBartender
      time: 3600 # 1hr
  storage:
    back:
    - DrinkShaker
