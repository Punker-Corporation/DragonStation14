- type: entity
  name: syndicate radio implanter box
  parent: BoxCardboard
  id: BoxSyndicateRadioImplanter
  description: Contains cranial radio implants favored by Syndicate agents.
  components:
  - type: Sprite
    layers:
    - state: box_of_doom
    - state: implant
  - type: StorageFill
    contents:
    - id: RadioImplanter
      amount: 2

- type: entity
  name: syndicate hostage implanter box
  parent: BoxCardboard
  id: BoxSyndicateHostageImplanter
  description: Contains hostage implants.
  components:
  - type: Sprite
    layers:
    - state: box_of_doom
    - state: implant
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,3
    whitelist:
      components:
      - Implanter
  - type: StorageFill
    contents:
    - id: HostageImplanter
      amount: 6

- type: entity
  name: syndicate handcuff box
  parent: BoxCardboard
  id: BoxSyndicateHandcuffBundle
  description: Contains a large amount of handcuffs
  components:
  - type: Sprite
    layers:
    - state: box_of_doom
    - state: handcuff
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,4,3
    whitelist:
      components:
      - Handcuff
  - type: StorageFill
    contents:
    - id: Handcuffs
      amount: 10
