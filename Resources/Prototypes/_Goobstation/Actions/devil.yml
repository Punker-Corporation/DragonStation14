# Devil Specific

- type: entity
  parent: BaseAction
  id: ActionCreateContract
  name: Invocar contrato infernal
  description: Cria um contrato infernal na mão do diabo.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: summon-contract
  - type: InstantAction
    event: !type:CreateContractEvent {}

- type: entity
  parent: BaseAction
  id: ActionCreateRevivalContract
  name: Invocar contrato de ressurreição
  description: Cria um contrato de ressurreição na mão do diabo.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: summon-contract-revival
  - type: InstantAction
    event: !type:CreateRevivalContractEvent {}

- type: entity
  parent: BaseAction
  id: ActionShadowJaunt
  name: Viagem das Sombras
  description: Torne-se um com as sombras.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 40 # Stop running you cowardly fucks.
    itemIconStyle: NoItem
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: shadow-jaunt
  - type: InstantAction
    event: !type:ShadowJauntEvent {}

- type: entity
  parent: BaseAction
  id: ActionDevilPossess
  name: possuir alvo
  description: Temporariamente possua o alvo, funciona apenas em alvos contratados.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    useDelay: 70
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: possess
  - type: TargetAction
    interactOnMiss: false
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - Body
    event: !type:DevilPossessionEvent {}

- type: entity
  parent: BaseAction
  id: ActionEndPossession
  name: Terminar possessão
  description: Cancela a possessão prematuramente.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: possess
  - type: InstantAction
    event: !type:EndPossessionEarlyEvent {}

- type: entity
  parent: BaseAction
  id: ActionDevilGrip
  name: Pegada do diabo
  description: Uma pequena fração do poder que sobrou neste plano astral, Canalizada em suas mãos.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: devil-grip
  - type: InstantAction
    event: !type:DevilGripEvent {}

# Deals

- type: entity
  parent: BaseAction
  id: ActionCheatDeath
  name: Trapacear a morte
  description: Ria na cara do ceifador, você ainda tem tempo.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: NoItem
    useDelay: 250
    checkCanInteract: false
    checkConsciousness: false
    icon:
      sprite: _Goobstation/Actions/devil.rsi
      state: cheat-death
  - type: InstantAction
    event: !type:CheatDeathEvent {}
