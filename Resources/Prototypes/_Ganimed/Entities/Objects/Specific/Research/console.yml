- type: entity
  parent: BaseComputer
  id: ComputerBotanicDNAManipulator
  name: "Манипулятор ДНК семян"
  description: "На панели редкое количество разных семян. Видимо, кто-то плохо убирает за собой аппарат."
  components:
  - type: SeedDnaConsole
    seedSlot:
      name: "Семена"
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: true
      whitelist:
        components:
        - Seed
    dnaDiskSlot:
      name: "ДНК Диск"
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: true
      whitelist:
        components:
        - DnaDisk
  - type: ActivatableUI
    key: enum.SeedDnaConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SeedDnaConsoleUiKey.Key:
        type: SeedDnaConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: Sprite
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: generic
    - map: [ "computerLayerKeys" ]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: Computer
    board: BotanicDNACircuitboard
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#3c5eb5"
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      board: !type:Container
      SeedSlotId: !type:ContainerSlot
      DnaDiskSlotId: !type:ContainerSlot
