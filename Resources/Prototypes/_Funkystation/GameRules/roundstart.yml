- type: entity
  id: BloodCult
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 20
  - type: BloodCultRule
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ BloodCultist ]
      max: 3
      playerRatio: 15
      startingGear: BloodCultistGear
      briefing:
        text: cult-start-briefing
        color: CornflowerBlue
        sound: "/Audio/_Funkystation/Ambience/Antag/cultist_start.ogg"
      components:
      - type: BloodCultist
      mindRoles:
      - MindRoleCultist
  - type: Tag
    tags:
      - RoundstartAntag

- type: entity
  id: MalfAi
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 20
  - type: MalfAiRule
  - type: AntagObjectives
    objectives:
    - MalfAiSurviveObjective
  - type: AntagRandomObjectives
    sets:
    - groups: MalfAiSabotageObjectives
      maxPicks: 3
    maxDifficulty: 8
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    definitions:
    - prefRoles: [ MalfunctioningAI ]
      max: 1
      allowNonHumans: true
      briefing:
        text: roles-antag-malfunctioning-ai-briefing
        color: Red
        sound: "/Audio/_Funkystation/Ambience/Antag/malfai_start.ogg"
      components:
      - type: MalfunctioningAi
      mindRoles:
      - MindRoleMalfAi
