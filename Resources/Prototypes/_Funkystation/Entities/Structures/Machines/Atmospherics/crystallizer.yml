- type: entity
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  id: Crystallizer
  name: crystallizer
  description: Used to crystallize or solidify gases.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Funkystation/Structures/Machines/crystallizer.rsi
    drawdepth: Mobs
    noRot: true
    offset: 0, 0.5
    layers:
      - sprite: Structures/Piping/Atmospherics/pipe.rsi
        state: pipeBinaryConnectors
        offset: 0, -0.5
        map: [ "enum.PipeVisualLayers.Pipe" ]
      - state: off
        map: [ "enum.PowerDeviceVisualLayers.Powered" ]
      - state: panel
        map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { state: on }
          False: { state: off }
  - type: Appearance
  - type: PipeColorVisuals
  - type: Rotatable
  - type: Crystallizer
  - type: AtmosPipeColor
  - type: AtmosPipeLayers
    spriteLayersRsiPaths:
      enum.PipeVisualLayers.Pipe:
        Primary: Structures/Piping/Atmospherics/pipe.rsi
        Secondary: Structures/Piping/Atmospherics/pipe_alt1.rsi
        Tertiary: Structures/Piping/Atmospherics/pipe_alt2.rsi
  - type: AtmosDevice
  - type: UserInterface
    interfaces:
      enum.CrystallizerUiKey.Key:
        type: CrystallizerBoundUserInterface
  - type: ActivatableUI
    key: enum.CrystallizerUiKey.Key
    requiresComplex: false
  - type: WiresVisuals
  - type: WiresPanel
  - type: PipeRestrictOverlap
  - type: NodeContainer
    nodes:
      regulator:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: North
      inlet:
        !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
  - type: Transform
    noRot: false
  - type: PipeAppearance
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        density: 200
        mask:
          - MachineMask
        layer:
          - MachineLayer
  - type: Machine
    board: CrystallizerMachineCircuitboard
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
        - !type:EmptyAllContainersBehaviour
        - !type:PlaySoundBehavior
          sound:
            collection: WindowShatter
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
  - type: ApcPowerReceiver
    powerLoad: 3000
  - type: AtmosMonitoringConsoleDevice
    navMapBlip: Thermoregulator
  - type: PointLight
    color: "#3a807f"
    radius: 2
    energy: 10
    enabled: false
