- type: entity
  id: HFRInstructions
  categories: [ HideSpawnMenu ]
  suffix: "hfr instructions"
  parent: Paper
  components:
  - type: Paper
    content: |2

      [head=1]Guia Rápido para o manuseio seguro do Reator de Fusão Hypertorus[/head]

      [head=3]Instruções de Operação[/head]
      - Construa a máquina conforme mostrado no guia principal.
      - Crie uma mistura gasosa 50/50 de trítio e hidrogênio, totalizando aproximadamente 2000 moles.
      - Ligue a máquina e encha o circuito de resfriamento com plasma ou hyper-noblium. Use o espaço ou congeladores para resfriá-lo.
      - Conecte a mistura de combustível na porta de injeção de combustível, permitindo apenas 1000 moles na máquina para facilitar o início da reação.
      - Ajuste o condutor de calor para 500 ao iniciar a reação, depois redefina para 100 quando o nível de potência exceder 1.
      - Em caso de derretimento:
        - Ajuste o condutor de calor e o amortecedor de corrente para o máximo.
        - Ajuste a injeção de combustível para o mínimo.
        - Se a saída de calor continuar positiva, ajuste os constritores magnéticos até que se torne negativa.
        - Reforce o resfriamento e use gases de alta capacidade térmica (por exemplo, hyper-noblium) no moderador para controlar o problema.

      [head=3]Avisos[/head]
      - A máquina não pode ser desmontada ou desligada se o nível de potência estiver acima de 0.
      - Os gases residuais não podem ser descartados se o nível de potência estiver acima de 5.
      - Apenas helium e hyper-noblium podem ser removidos da mistura de fusão.
      - O hyper-noblium reduz significativamente a potência da mistura.
      - O anti-noblium aumenta significativamente a potência da mistura.
      - Gases com alta capacidade térmica são mais difíceis de aquecer ou resfriar.
      - Gases com baixa capacidade térmica são mais fáceis de aquecer ou resfriar.
      - A máquina consome 100 kW de energia quando em funcionamento, então prepare a energia da estação adequadamente antes de ligar o RFH.
      - Recomenda-se fortemente configurar múltiplos geradores de energia antes de operar o RFH.
      - Em caso de falta de energia, a reação de fusão continua, mas o resfriamento para.
      - No evento de uma falta de energia prolongada, corte toda a energia do RFH até que o problema seja resolvido.

      [head=3]Aviso Legal[/head]
      O autor deste guia rápido não se responsabiliza por mau uso ou derretimentos causados ao seguir este guia. Consulte os guias avançados para informações detalhadas sobre gases moderadores.
