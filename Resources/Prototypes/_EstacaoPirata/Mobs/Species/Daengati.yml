- type: entity
  parent: BaseMobHuman
  name: Urist McDemon
  id: MobDaengatiBase
  abstract: true
  components:
  #- type: Speech # O valor não pode ser nulo, vai ficar assim até ter um valor
  #  speechVerb:  #No momento que estou fazendo isso acredito que não tenha um modo de falar especifico dos daengatis
  - type: LanguageKnowledge # Einstein Engines - Languages
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
  - type: HumanoidAppearance
    species: Daengati
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 3.5
        Heat: 2
  - type: Temperature
    heatDamageThreshold: 500
    coldDamageThreshold: 270
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold : 0.4 #o padrão é 0.1
    heatDamage:
      types:
        Heat : 0.5 #O padrão é 1.5
  - type: Damageable
    damageModifierSet: Daengati
  - type: Body
    prototype: Daengati
  - type: TypingIndicator
    proto: oni #Mudar apos adicionar indicador de escrita de daengati
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
- type: entity
  save: false
  name: Urist McDemon
  parent: MobHumanDummy
  id: MobDaengatiDummy
  description: A dummy Daengati meant to be used in character setup.
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  # Corvax-Wega-Genetics-start
  - type: DnaModifier
    upper: MobDaengati
    lowest: MobMonkeyDaengati
  # Corvax-Wega-Genetics-end

