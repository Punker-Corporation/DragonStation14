- type: emote
  id: DanceFromTheFloor
  name: chat-emote-name-dance-the-from-floor
  chatMessages: ["chat-emote-msg-dance-from-the-floor"]
  chatTriggers:
  - dance from the floor
  - dances from the floor.
  - dances from the floor!
  - танцует от пола
  - танцует от пола.
  - танцует от пола!
  - dançar no chão
  - dançar no chão.
  - dançar no chão!
  targetEvents:
  - !type:PlayAnimationTargetEvent
    animationID: EmoteDanceFromTheFloor
  - !type:ApplyStatusEffectTargetEvent
    key: SlowedDown
    componentType: SlowedDown
    time: 5

